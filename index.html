<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Video-Marketing Score | Film-labor</title>
  <meta name="description" content="Finde in 2 Minuten heraus, wie gut dein Unternehmen für Video-Marketing aufgestellt ist. Kostenloser Score mit konkreten Empfehlungen.">
  <meta property="og:title" content="Video-Marketing Score | Film-labor">
  <meta property="og:description" content="Kostenloser Video-Marketing Check in 2 Minuten. Erhalte deinen persönlichen Score und konkrete Handlungsempfehlungen.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" href="style.css">

  <!-- SVG gradient for score ring + radar chart -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="scoreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#3a8ff5" />
        <stop offset="100%" style="stop-color:#1a6fd5" />
      </linearGradient>
    </defs>
  </svg>
</head>
<body>
  <div class="bg-ambient"></div>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="header">
    <img src="logo.png" alt="Film-labor">
    <div class="divider"></div>
    <span class="label">Video-Marketing Score</span>
  </div>

  <div class="step-info" id="stepInfo">
    Frage <span id="stepCurrent">1</span> von <span id="stepTotal">10</span>
  </div>

  <div class="app">
    <div class="quiz-container" id="quizContainer"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
